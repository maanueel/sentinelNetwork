<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles del Sistema - Sentinel</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-box { background: #0f172a; padding: 18px; border-radius: 10px; border-left: 4px solid #a855f7; transition: transform 0.2s; }
        .info-box:hover { transform: translateY(-3px); }
        .full-width { grid-column: span 2; border-left-color: #f472b6; }
        .proc-list { list-style: none; padding: 0; margin: 0; }
        .proc-item { padding: 12px; border-bottom: 1px solid #334155; display: flex; align-items: center; color: #cbd5e1; font-size: 0.95rem; }
        .proc-item:last-child { border-bottom: none; }
        .proc-item:hover { background: #2d3748; color: white; border-radius: 5px; }
        .btn-back { background: #334155; color: white; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .btn-back:hover { background: #475569; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .badge { background: rgba(244, 114, 182, 0.1); color: #f472b6; padding: 2px 8px; border-radius: 4px; margin-right: 15px; font-weight: bold; font-size: 0.75rem; }
        h3 { margin-top: 0; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }
        .value { font-size: 1.15rem; margin-top: 8px; color: #f8fafc; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <small style="color: #6366f1; font-weight: bold; letter-spacing: 1px;">ANÁLISIS DE HARDWARE</small>
                <h1 id="hostname" style="margin: 5px 0 0 0; font-size: 1.8rem;">Conectando...</h1>
            </div>
            <a href="/" class="btn-back">⬅ Volver al Panel</a>
        </div>

        <div class="card">
            <div class="info-grid">
                <div class="info-box full-width">
                    <small style="color: #f472b6; font-weight: bold;">SISTEMA Y MODELO DEL FABRICANTE</small>
                    <div id="sys_model" class="value">Detectando modelo...</div>
                </div>
                <div class="info-box">
                    <small style="color: #a855f7; font-weight: bold;">PROCESADOR (WMIC NAME)</small>
                    <div id="cpu_model" class="value">---</div>
                </div>
                <div class="info-box">
                    <small style="color: #a855f7; font-weight: bold;">MEMORIA FÍSICA INSTALADA</small>
                    <div id="ram_total" class="value">---</div>
                </div>
            </div>

            <h3>Procesos Prioritarios (Top 10)</h3>
            <ul id="process_list" class="proc-list">
                <li class="proc-item">Iniciando consulta SNMP a la tabla de procesos...</li>
            </ul>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const ip = params.get('ip');
        const API_URL = `http://${window.location.hostname}:5000`;

        if (!ip) {
            document.getElementById('hostname').innerText = "Error: Falta IP";
        } else {
            fetch(`${API_URL}/api/processes/${ip}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('hostname').innerText = `Host: ${data.hostname}`;
                    document.getElementById('cpu_model').innerText = data.cpu_model;
                    document.getElementById('sys_model').innerText = data.sys_model;
                    document.getElementById('ram_total').innerText = data.total_ram;
                    
                    const list = document.getElementById('process_list');
                    if (data.processes && data.processes.length > 0) {
                        list.innerHTML = data.processes.map(p => `
                            <li class="proc-item"><span class="badge">RUNNING</span> ${p}</li>
                        `).join('');
                    } else {
                        list.innerHTML = '<li class="proc-item">No se obtuvieron procesos.</li>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('process_list').innerHTML = '<li class="proc-item" style="color: #ef4444;">Error de comunicación con el Backend.</li>';
                });
        }
    </script>
</body>
</html>
