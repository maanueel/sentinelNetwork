<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesos del Sistema - Sentinel</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .info-box { background: #0f172a; padding: 15px; border-radius: 10px; border-left: 4px solid #a855f7; }
        .proc-list { list-style: none; padding: 0; }
        .proc-item { padding: 12px; border-bottom: 1px solid #334155; display: flex; align-items: center; color: #cbd5e1; }
        .proc-item:hover { background: #2d3748; }
        .btn-back { background: #334155; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .badge { color: #f472b6; margin-right: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="hostname">Cargando...</h1>
            <a href="/" class="btn-back">⬅ Volver al Monitor</a>
        </div>
        <div class="card">
            <div class="info-grid">
                <div class="info-box">
                    <small style="color: #a855f7;">MODELO PROCESADOR</small>
                    <div id="cpu_model" style="font-size: 1.1rem; margin-top: 5px;">---</div>
                </div>
                <div class="info-box">
                    <small style="color: #a855f7;">CAPACIDAD RAM</small>
                    <div id="ram_total" style="font-size: 1.1rem; margin-top: 5px;">---</div>
                </div>
            </div>
            <h3>Top 10 Procesos en Ejecución</h3>
            <ul id="process_list" class="proc-list">
                <li>Obteniendo lista de procesos...</li>
            </ul>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const ip = params.get('ip');

        fetch(`/api/processes/${ip}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('hostname').innerText = `Equipo: ${data.hostname}`;
                document.getElementById('cpu_model').innerText = data.cpu_model;
                document.getElementById('ram_total').innerText = data.total_ram;
                const list = document.getElementById('process_list');
                list.innerHTML = data.processes.map(p => `
                    <li class="proc-item"><span class="badge">TASK</span> ${p}</li>
                `).join('');
            });
    </script>
</body>
</html>
